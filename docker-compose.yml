version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: rms_postgres
    environment:
      POSTGRES_USER: rms_user
      POSTGRES_PASSWORD: rms_password
      POSTGRES_DB: rms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rms_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rms_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rms_network

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - rms_network

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - rms_network

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - rms_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      rms_network:
        aliases:
          - rms-otel-collector

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
    networks:
      - rms_network

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rms-alerts.yml:/etc/prometheus/rules/rms-alerts.yml:ro
    ports:
      - "9090:9090"
    networks:
      - rms_network

  grafana:
    image: grafana/grafana:11.1.3
    volumes:
      - ./observability/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    ports:
      - "3001:3000"
    networks:
      - rms_network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8081:8081"
      - "50061:50061"
    environment:
      - RMS_AUTH_SECRET=dev-auth-secret
      - RMS_AUTH_ISSUER=rms-auth
      - RMS_AUTH_AUDIENCE=rms-platform
      - RMS_AUTH_TTL=15m
      - RMS_AUTH_CLIENTS=trading-platform:dev-secret:institutional:trader,allocator;ops-console:dev-secret:operations:admin
      - RMS_HTTP_ADDR=:8081
      - RMS_GRPC_ADDR=:50061
      - LOG_LEVEL=info
    depends_on:
      - kafka
      - otel-collector
    networks:
      rms_network:
        aliases:
          - rms-auth-service

  order-ingestion-service:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        SERVICE_PATH: cmd/order-ingestion-service
    ports:
      - "50062:50062"
      - "8082:8082"
    environment:
      - RMS_DECISION_STORE_PATH=/data/risk-decisions.jsonl
      - RMS_REDIS_ADDR=redis:6379
      - RMS_KAFKA_BROKERS=kafka:9092
      - RMS_RULE_ENGINE_ADDR=rule-engine-service:50064
      - RMS_HTTP_ADDR=:8082
      - RMS_GRPC_ADDR=:50062
    depends_on:
      - redis
      - kafka
      - rule-engine-service
    volumes:
      - risk_decisions_data:/data
    networks:
      - rms_network

  risk-evaluation-service:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        SERVICE_PATH: cmd/risk-evaluation-service
    ports:
      - "50063:50063"
      - "8083:8083"
    environment:
      - RMS_DECISION_STORE_PATH=/data/risk-decisions.jsonl
      - RMS_REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - RMS_RULE_ENGINE_ADDR=rule-engine-service:50064
      - RMS_KAFKA_GROUP_ID=risk-evaluation-service
      - RMS_HTTP_ADDR=:8083
      - RMS_GRPC_ADDR=:50063
    depends_on:
      - redis
      - kafka
      - rule-engine-service
    volumes:
      - risk_decisions_data:/data
    networks:
      - rms_network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "50050:50050"
      - "8080:8080"
    environment:
      - RMS_ORDER_INGESTION_ADDR=order-ingestion-service:50062
      - RMS_MARKET_DATA_ADDR=market-data-consumer:50054
      - RMS_POSITION_TRACKING_ADDR=position-tracking-service:50056
      - RMS_EXPOSURE_ADDR=exposure-aggregation-service:50055
      - RMS_MARGIN_ADDR=margin-calculation-engine:50057
      - RMS_AUTH_SECRET=dev-auth-secret
      - RMS_AUTH_ISSUER=rms-auth
      - RMS_AUTH_AUDIENCE=rms-platform
      - RMS_GATEWAY_RATE_LIMIT=200
      - RMS_HTTP_PORT=8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    depends_on:
      - order-ingestion-service
      - market-data-consumer
      - position-tracking-service
      - exposure-aggregation-service
      - margin-calculation-engine
      - auth-service
    networks:
      rms_network:
        aliases:
          - rms-api-gateway

  exposure-aggregation-service:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        SERVICE_PATH: cmd/exposure-aggregation-service
    ports:
      - "50055:50055"
      - "8086:8086"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rms_db
      - POSTGRES_USER=rms_user
      - POSTGRES_PASSWORD=rms_password
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - RMS_KAFKA_GROUP_ID=exposure-aggregation-service
      - HTTP_ADDR=:8086
      - GRPC_ADDR=:50055
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - rms_network

  margin-calculation-engine:
    build:
      context: .
      dockerfile: services/margin-calculation-engine/Dockerfile
    ports:
      - "50057:50057"
    depends_on:
      - postgres
      - kafka
    networks:
      - rms_network

  position-tracking-service:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        SERVICE_PATH: cmd/position-tracking-service
    ports:
      - "50056:50056"
      - "8085:8085"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rms_db
      - POSTGRES_USER=rms_user
      - POSTGRES_PASSWORD=rms_password
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - HTTP_ADDR=:8085
      - GRPC_ADDR=:50056
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - rms_network

  portfolio-risk-engine:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        SERVICE_PATH: cmd/portfolio-risk-engine
    ports:
      - "50058:50058"
      - "8087:8087"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rms_db
      - POSTGRES_USER=rms_user
      - POSTGRES_PASSWORD=rms_password
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_ID=portfolio-risk-engine
      - HTTP_ADDR=:8087
      - GRPC_ADDR=:50058
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - rms_network

  rule-engine-service:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        SERVICE_PATH: cmd/rule-engine-service
    ports:
      - "50064:50064"
      - "8084:8084"
    environment:
      - RMS_REDIS_ADDR=redis:6379
      - RMS_KAFKA_BROKERS=kafka:9092
      - RMS_HTTP_ADDR=:8084
      - RMS_GRPC_ADDR=:50064
    depends_on:
      - redis
      - kafka
    networks:
      - rms_network

  alerting-service:
    build:
      context: .
      dockerfile: services/alerting-service/Dockerfile
    ports:
      - "50052:50052"
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - rms_network

  audit-logging-service:
    build:
      context: .
      dockerfile: services/audit-logging-service/Dockerfile
    ports:
      - "50053:50053"
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - rms_network

  market-data-consumer:
    build:
      context: .
      dockerfile: services/market-data-consumer/Dockerfile
    ports:
      - "50054:50054"
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - redis
      - kafka
    networks:
      - rms_network

  admin-dashboard:
    build:
      context: .
      dockerfile: client/admin-dashboard/Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      rms_network:
        aliases:
          - rms-admin-dashboard

networks:
  rms_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  risk_decisions_data:
