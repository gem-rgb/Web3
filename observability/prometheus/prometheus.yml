global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: rms-api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - rms-api-gateway:8080

  - job_name: rms-otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - rms-otel-collector:8889
