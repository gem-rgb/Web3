apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-evaluation-service
  labels:
    app: risk-evaluation-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: risk-evaluation-service
  template:
    metadata:
      labels:
        app: risk-evaluation-service
    spec:
      containers:
      - name: risk-evaluation-service
        image: rms/risk-evaluation-service:latest
        ports:
        - containerPort: 50051
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: rms-secrets
              key: database-url
        - name: REDIS_ADDR
          valueFrom:
            secretKeyRef:
              name: rms-secrets
              key: redis-addr
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: rms-secrets
              key: kafka-brokers
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: risk-evaluation-service
  labels:
    app: risk-evaluation-service
spec:
  selector:
    app: risk-evaluation-service
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
  type: ClusterIP