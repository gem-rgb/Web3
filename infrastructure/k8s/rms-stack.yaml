apiVersion: apps/v1
kind: Deployment
metadata:
  name: rms-risk-evaluation-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rms-risk-evaluation-service
  template:
    metadata:
      labels:
        app: rms-risk-evaluation-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rms-risk-evaluation-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: risk-evaluation-service
          image: rms/risk-evaluation-service:latest
          ports:
            - containerPort: 50051
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rms-secrets
                  key: database-url
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: rms-secrets
                  key: redis-addr
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: rms-secrets
                  key: kafka-brokers
---
apiVersion: v1
kind: Service
metadata:
  name: rms-risk-evaluation-service
spec:
  selector:
    app: rms-risk-evaluation-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rms-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rms-api-gateway
  template:
    metadata:
      labels:
        app: rms-api-gateway
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rms-api-gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api-gateway
          image: rms/api-gateway:latest
          ports:
            - containerPort: 50050
            - containerPort: 8080
          env:
            - name: RMS_RISK_EVAL_ADDR
              value: rms-risk-evaluation-service:50051
            - name: RMS_MARKET_DATA_ADDR
              value: rms-market-data-consumer:50054
            - name: RMS_POSITION_TRACKING_ADDR
              value: rms-position-tracking-service:50056
            - name: RMS_EXPOSURE_ADDR
              value: rms-exposure-aggregation-service:50055
            - name: RMS_MARGIN_ADDR
              value: rms-margin-calculation-engine:50057
            - name: RMS_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: rms-platform-secrets
                  key: auth-secret
            - name: RMS_AUTH_ISSUER
              value: rms-auth
            - name: RMS_AUTH_AUDIENCE
              value: rms-platform
            - name: RMS_HTTP_PORT
              value: "8080"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: rms-otel-collector:4317
---
apiVersion: v1
kind: Service
metadata:
  name: rms-api-gateway
spec:
  selector:
    app: rms-api-gateway
  ports:
    - name: grpc
      port: 50050
      targetPort: 50050
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rms-exposure-aggregation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rms-exposure-aggregation-service
  template:
    metadata:
      labels:
        app: rms-exposure-aggregation-service
    spec:
      containers:
        - name: exposure-aggregation-service
          image: rms/exposure-aggregation-service:latest
          ports:
            - name: grpc
              containerPort: 50055
            - name: http
              containerPort: 8086
          env:
            - name: POSTGRES_HOST
              value: rms-postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: rms_db
            - name: POSTGRES_USER
              value: rms_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rms-platform-secrets
                  key: postgres-password
            - name: REDIS_ADDR
              value: rms-redis:6379
            - name: KAFKA_BROKERS
              value: rms-kafka:9092
            - name: RMS_KAFKA_GROUP_ID
              value: exposure-aggregation-service
            - name: HTTP_ADDR
              value: :8086
            - name: GRPC_ADDR
              value: :50055
---
apiVersion: v1
kind: Service
metadata:
  name: rms-exposure-aggregation-service
spec:
  selector:
