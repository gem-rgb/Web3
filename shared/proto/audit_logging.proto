syntax = "proto3";

package rms.audit;

// Import common messages
import "common.proto";

service AuditLoggingService {
  rpc LogEvent (AuditEvent) returns (AuditResponse);
  rpc GetEvents (AuditQueryRequest) returns (AuditQueryResponse);
  rpc StreamEvents (AuditQueryRequest) returns (stream AuditEvent);
}

message AuditEvent {
  string event_id = 1;
  string event_type = 2; // e.g., "ORDER_EVALUATED", "POSITION_UPDATED", "RULE_VIOLATION"
  string account_id = 3;
  string user_id = 4; // optional
  string service_name = 5; // which service generated the event
  string payload_json = 6; // JSON string of event-specific data
  int64 timestamp = 7; // Unix milliseconds
  int64 ingest_timestamp = 8; // when the event was ingested by audit service
  map<string, string> metadata = 9; // additional metadata
}

message AuditResponse {
  string event_id = 1;
  int64 timestamp = 2;
}

message AuditQueryRequest {
  string account_id = 1; // optional
  string event_type = 2; // optional
  string service_name = 3; // optional
  int64 start_time = 4; // optional: start timestamp (Unix ms)
  int64 end_time = 5; // optional: end timestamp (Unix ms)
  int32 limit = 6; // max number of events to return
  int32 offset = 7; // for pagination
}

message AuditQueryResponse {
  repeated AuditEvent events = 1;
  int64 timestamp = 2;
  int32 total_count = 3; // total number of matching events (before limit/offset)
}