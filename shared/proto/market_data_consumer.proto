syntax = "proto3";

package rms.marketdata;

import "common.proto";

service MarketDataConsumerService {
  rpc SubscribeToMarketData (MarketDataSubscriptionRequest) returns (stream rms.common.MarketDataUpdate);
  rpc GetLatestMarketData (MarketDataRequest) returns (MarketDataResponse);
  rpc GetMarketDataHistory (MarketDataHistoryRequest) returns (MarketDataHistoryResponse);
}

message MarketDataSubscriptionRequest {
  repeated string symbols = 1;
}

message MarketDataRequest {
  repeated string symbols = 1;
}

message MarketDataResponse {
  repeated rms.common.MarketDataUpdate market_data = 1;
  int64 timestamp = 2;
}

message MarketDataHistoryRequest {
  string symbol = 1;
  int64 start_time = 2;
  int64 end_time = 3;
  int32 limit = 4;
}

message MarketDataHistoryResponse {
  repeated rms.common.MarketDataUpdate market_data = 1;
  int64 timestamp = 2;
}
