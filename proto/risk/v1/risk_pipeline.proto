syntax = "proto3";

package rms.risk.v1;

option go_package = "github.com/example/rms/generated/go/risk/v1;riskv1";

import "common/v1/common.proto";
import "orders/v1/orders.proto";

message RiskEvaluationRequest {
  rms.common.v1.Order order = 1;
  rms.common.v1.Account account = 2;
  string tenant_id = 3;
  string idempotency_key = 4;
  string correlation_id = 5;
  string source = 6;
  map<string, string> metadata = 7;
}

message RiskEvaluationResponse {
  rms.orders.v1.RiskDecision decision = 1;
}

message BatchRiskEvaluationRequest {
  repeated RiskEvaluationRequest requests = 1;
}

message BatchRiskEvaluationResponse {
  repeated RiskEvaluationResponse responses = 1;
  int64 timestamp = 2;
}

message RiskDecisionQueryRequest {
  string order_id = 1;
  string account_id = 2;
  string tenant_id = 3;
  string correlation_id = 4;
}

message RiskDecisionQueryResponse {
  rms.orders.v1.RiskDecision decision = 1;
  bool found = 2;
  int64 timestamp = 3;
}

service RiskEvaluationService {
  rpc EvaluateOrder(RiskEvaluationRequest) returns (RiskEvaluationResponse);
  rpc BatchEvaluateOrders(BatchRiskEvaluationRequest) returns (BatchRiskEvaluationResponse);
  rpc GetDecision(RiskDecisionQueryRequest) returns (RiskDecisionQueryResponse);
  rpc StreamOrderEvaluations(stream RiskEvaluationRequest) returns (stream RiskEvaluationResponse);
}
