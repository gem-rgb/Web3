syntax = "proto3";

package rms.orders.v1;

option go_package = "github.com/example/rms/generated/go/orders/v1;ordersv1";

import "common/v1/common.proto";

enum OrderState {
  ORDER_STATE_UNSPECIFIED = 0;
  ORDER_STATE_RECEIVED = 1;
  ORDER_STATE_EVALUATED = 2;
  ORDER_STATE_APPROVED = 3;
  ORDER_STATE_REJECTED = 4;
  ORDER_STATE_DUPLICATE = 5;
  ORDER_STATE_FAILED = 6;
}

message OrderIngestionRequest {
  rms.common.v1.Order order = 1;
  rms.common.v1.Account account = 2;
  string tenant_id = 3;
  string idempotency_key = 4;
  string correlation_id = 5;
  string source = 6;
  string requested_by = 7;
  map<string, string> metadata = 8;
}

message RiskDecision {
  string decision_id = 1;
  string order_id = 2;
  string account_id = 3;
  string tenant_id = 4;
  string correlation_id = 5;
  string trace_id = 6;
  string idempotency_key = 7;
  string engine = 8;
  string rule_version = 9;
  bool approved = 10;
  string reject_reason = 11;
  repeated rms.common.v1.Violation violations = 12;
  string decision_source = 13;
  map<string, string> metadata = 14;
  int64 evaluated_at = 15;
  int64 persisted_at = 16;
  int64 latency_micros = 17;
  string version = 18;
}

message OrderIngestionResponse {
  string order_id = 1;
  OrderState state = 2;
  bool accepted = 3;
  RiskDecision decision = 4;
  string correlation_id = 5;
  string trace_id = 6;
  int64 timestamp = 7;
}

message OrderDecisionQueryRequest {
  string order_id = 1;
  string account_id = 2;
  string tenant_id = 3;
  string correlation_id = 4;
}

message OrderDecisionQueryResponse {
  RiskDecision decision = 1;
  bool found = 2;
  int64 timestamp = 3;
}

service OrderIngestionService {
  rpc SubmitOrder(OrderIngestionRequest) returns (OrderIngestionResponse);
  rpc GetOrderDecision(OrderDecisionQueryRequest) returns (OrderDecisionQueryResponse);
  rpc StreamOrderDecisions(OrderDecisionQueryRequest) returns (stream OrderIngestionResponse);
}
