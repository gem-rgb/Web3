syntax = "proto3";

package rms.gateway.v1;

option go_package = "github.com/example/rms/generated/go/gateway/v1;gatewayv1";

import "common/v1/common.proto";

message SubmitOrderRequest {
  rms.common.v1.Order order = 1;
  rms.common.v1.Account account = 2;
}

message SubmitOrderResponse {
  bool approved = 1;
  string reject_reason = 2;
  repeated rms.common.v1.Violation violations = 3;
}

service ApiGateway {
  rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);
}
